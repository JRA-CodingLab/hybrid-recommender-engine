<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid Recommender Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --success: #22c55e;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      line-height: 1.6;
    }
    h1 { text-align: center; margin-bottom: 2rem; font-size: 1.75rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--primary); }
    label { display: block; margin-bottom: .25rem; font-size: .85rem; color: var(--muted); }
    input, textarea {
      width: 100%;
      padding: .5rem .75rem;
      margin-bottom: .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: .9rem;
    }
    button {
      padding: .55rem 1.25rem;
      border: none;
      border-radius: 6px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: .9rem;
      transition: background .15s;
    }
    button:hover { background: var(--primary-hover); }
    .output {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-family: "Fira Code", monospace;
      font-size: .8rem;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .badge { display: inline-block; padding: .15rem .5rem; border-radius: 999px; font-size: .75rem; }
    .badge.ok { background: #166534; color: #bbf7d0; }
    .badge.err { background: #7f1d1d; color: #fecaca; }
    .status-row { display: flex; gap: .5rem; align-items: center; margin-bottom: .75rem; }
  </style>
</head>
<body>

<h1>⚡ Hybrid Recommender Dashboard</h1>

<div class="grid">

  <!-- Health -->
  <div class="card">
    <h2>System Health</h2>
    <div class="status-row">
      <span>Status:</span>
      <span id="health-badge" class="badge">—</span>
    </div>
    <div id="health-details" class="output">Click "Check" to query the API.</div>
    <br />
    <button onclick="checkHealth()">Check</button>
  </div>

  <!-- Recommendations -->
  <div class="card">
    <h2>Get Recommendations</h2>
    <label for="rec-user">User ID</label>
    <input id="rec-user" placeholder="e.g. user_42" />
    <label for="rec-history">History (comma-separated item IDs)</label>
    <input id="rec-history" placeholder="item_1, item_5, item_12" />
    <label for="rec-n">Number of results</label>
    <input id="rec-n" type="number" value="10" min="1" max="50" />
    <button onclick="getRecommendations()">Recommend</button>
    <div id="rec-output" class="output"></div>
  </div>

  <!-- Similar items -->
  <div class="card">
    <h2>Similar Items</h2>
    <label for="sim-item">Item ID</label>
    <input id="sim-item" placeholder="e.g. item_7" />
    <label for="sim-n">Number of results</label>
    <input id="sim-n" type="number" value="10" min="1" max="50" />
    <button onclick="getSimilar()">Find Similar</button>
    <div id="sim-output" class="output"></div>
  </div>

  <!-- Metrics -->
  <div class="card">
    <h2>System Metrics</h2>
    <div id="metrics-output" class="output">Click "Refresh" to load metrics.</div>
    <br />
    <button onclick="getMetrics()">Refresh</button>
  </div>

</div>

<script>
  const API = window.location.origin;

  async function api(path, options = {}) {
    try {
      const res = await fetch(`${API}${path}`, options);
      return await res.json();
    } catch (e) {
      return { error: e.message };
    }
  }

  async function checkHealth() {
    const data = await api("/");
    const badge = document.getElementById("health-badge");
    if (data.status === "healthy") {
      badge.textContent = "Healthy";
      badge.className = "badge ok";
    } else {
      badge.textContent = "Error";
      badge.className = "badge err";
    }
    document.getElementById("health-details").textContent = JSON.stringify(data, null, 2);
  }

  async function getRecommendations() {
    const userId = document.getElementById("rec-user").value.trim();
    const history = document.getElementById("rec-history").value
      .split(",")
      .map(s => s.trim())
      .filter(Boolean);
    const n = parseInt(document.getElementById("rec-n").value) || 10;
    const data = await api("/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, user_history: history, n_items: n }),
    });
    document.getElementById("rec-output").textContent = JSON.stringify(data, null, 2);
  }

  async function getSimilar() {
    const itemId = document.getElementById("sim-item").value.trim();
    const n = parseInt(document.getElementById("sim-n").value) || 10;
    const data = await api("/similar-items", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ item_id: itemId, n_items: n }),
    });
    document.getElementById("sim-output").textContent = JSON.stringify(data, null, 2);
  }

  async function getMetrics() {
    const data = await api("/metrics");
    document.getElementById("metrics-output").textContent = JSON.stringify(data, null, 2);
  }

  // Auto-check on load
  checkHealth();
</script>
</body>
</html>
