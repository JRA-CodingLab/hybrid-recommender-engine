# Render Blueprint for Hybrid Recommender Engine
services:
  - type: web
    name: hybrid-recommender-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true